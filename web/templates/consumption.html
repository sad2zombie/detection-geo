<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>消费日志 // GEO CONSUMPTION LOG</title>
    <link rel="stylesheet" href="/static/style.css?v=11">
</head>
<body>
    <script src="/static/bg-theme.js?v=1"></script>
    <div class="bg-layer bg-gradient"></div>
    <div class="bg-layer bg-grid"></div>
    <div class="bg-layer bg-scanlines"></div>
    <div class="top-bar"></div>
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <div class="container">
        <header>
            <div class="logo-line">
                <div class="logo-icon">&#128220;</div>
                <h1>消费日志</h1>
            </div>
            <p class="subtitle">GEO CONSUMPTION LOG</p>
            <nav class="top-nav">
                <a href="/">品牌检测</a>
                <a href="/tasks">任务管理</a>
                <a href="/consumption" class="active">消费日志</a>
                <a href="/terminal">终端信息</a>
            </nav>
        </header>

        <section class="card">
            <div class="card-corner tl"></div>
            <div class="card-corner tr"></div>
            <div class="card-corner bl"></div>
            <div class="card-corner br"></div>
            <div class="task-list-header">
                <h2>&#9654; 日志列表</h2>
                <div class="task-list-actions">
                    <button type="button" class="btn btn-outline btn-sm" id="btn-poll-once">立即拉取</button>
                </div>
            </div>
            <p class="consumption-hint" id="consumption-status-text">加载配置…</p>
            <div class="task-table-wrap">
                <table class="task-table" id="consumption-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>任务 ID</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="consumption-tbody">
                        <tr><td colspan="3" class="task-empty">加载中…</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="/static/consumption.js?v=3"></script>
</body>
</html>
